{% extends "dashboard/base.html" %}

{% block title %}Scanning QR... - Service Day Dashboard{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-fade-in text-center">
    <!-- Phone Mockup Frame -->
    <div
        class="bg-slate-900 rounded-[3rem] p-4 pt-12 pb-12 shadow-2xl relative border-4 border-slate-800 shadow-blue-500/10 active:scale-[0.99] transition-transform">
        <!-- Notch -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 w-24 h-6 bg-slate-800 rounded-full"></div>

        <!-- Screen Content -->
        <div
            class="bg-black rounded-[2rem] aspect-[9/16] overflow-hidden relative flex flex-col items-center justify-center">

            <!-- Real Camera Reader Element -->
            <div id="reader" class="w-full h-full bg-black z-30"></div>
            
            <!-- Fallback/Overlay Mock if Camera is Disabled -->
            <div id="overlay"
                class="absolute inset-0 pointer-events-none w-full h-full flex items-center justify-center z-40 hidden">
                <div class="relative w-64 h-64 border-2 border-blue-400 rounded-3xl flex items-center justify-center overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-blue-400 shadow-[0_0_15px_#60a5fa] animate-scan-line z-20"></div>
                    <div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-lg"></div>
                    <div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-lg"></div>
                    <div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-lg"></div>
                    <div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-lg"></div>
                </div>
            </div>

            <!-- UI Text -->
            <div class="absolute bottom-12 w-full text-center px-6">
                <p class="text-white font-black text-lg tracking-tight mb-1">Align QR Code</p>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">{{ activity.ngo_name }}
                    Check-in</p>
            </div>

            <!-- Status Indicator -->
            <div class="absolute bottom-4 flex items-center gap-2 z-40">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-ping"></div>
                <span id="status-text" class="text-[10px] text-blue-400 font-black uppercase">Requesting Camera...</span>
            </div>
        </div>
    </div>


</div>

<!-- Include HTML5-QRCode Library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const html5QrCode = new Html5Qrcode("reader");

        // Action when a QR code is detected
        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanning immediately to prevent multiple submissions
            html5QrCode.stop().then((ignore) => {
                // Change UI to reflect success
                document.getElementById("status-text").innerText = "Scan Successful! Checking in...";
                document.getElementById("status-dot").classList.replace("bg-blue-500", "bg-emerald-500");

                // Dynamically build a form to POST to the decoded URL
                const form = document.createElement("form");
                form.method = "POST";
                form.action = decodedText;  // The URL encoded in the QR code
                
                // Securely embed CSRF token
                const csrfToken = document.createElement("input");
                csrfToken.type = "hidden";
                csrfToken.name = "csrfmiddlewaretoken";
                csrfToken.value = "{{ csrf_token }}";
                form.appendChild(csrfToken);
                
                document.body.appendChild(form);
                form.submit();
            }).catch((err) => {
                console.error("Stop failed: ", err);
            });
        }

        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        // Start the camera (prefer environment/back camera)
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            // Show overlay once camera is playing
            document.getElementById("overlay").classList.remove("hidden");
            document.getElementById("status-text").innerText = "Align QR Code to scan";
        })
        .catch(err => {
            document.getElementById("status-text").innerText = "Camera access denied. Please allow permissions.";
            document.getElementById("status-dot").classList.replace("bg-blue-500", "bg-red-500");
        });
    });
</script>

<style>
    @keyframes scanLine {
        0% {
            top: 0;
        }

        100% {
            top: 100%;
        }
    }

    .animate-scan-line {
        animation: scanLine 2s linear infinite;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .animate-fade-in {
        animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
