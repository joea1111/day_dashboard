# Lab 12 & 13: CI Pipeline for Testing and Deployment Checks
name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.13.1
      uses: actions/setup-python@v4
      with:
        python-version: '3.13.1'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django djangorestframework django-filter drf-spectacular requests djangorestframework-simplejwt

    - name: Run NGO Service Checks (Lab 13 Task 4.2)
      run: |
        cd microservices/ngo_service
        python manage.py check

    - name: Run NGO Service Tests (Lab 12 - Unit & API Tests)
      run: |
        cd microservices/ngo_service
        python manage.py test

    - name: Run User Service Checks
      run: |
        cd microservices/user_service
        python manage.py check

    - name: Run Registration Service Checks
      run: |
        cd microservices/reg_service
        python manage.py check
